<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الشركاء — RAFD Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Almarai',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;direction:rtl;padding:2rem 1rem}
.top-link{position:fixed;top:1.25rem;right:1.5rem}
.top-link a{color:#64748b;font-size:.82rem;text-decoration:none;display:flex;align-items:center;gap:.3rem}
.top-link a:hover{color:#94a3b8}
.card{background:rgba(30,41,59,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:2.5rem;width:100%;max-width:420px}
.logo-wrap{text-align:center;margin-bottom:2rem}
.logo-icon{width:90px;height:90px;margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;background:#ffffff;border-radius:18px;padding:10px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.logo-title{font-size:1.3rem;font-weight:900;color:#fff}
.logo-sub{font-size:.8rem;color:#64748b;margin-top:.2rem}
.badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.25);border-radius:20px;padding:.3rem .85rem;font-size:.75rem;font-weight:700;margin-top:.75rem}
.fld{margin-bottom:1.1rem}
.fld label{display:block;font-size:.82rem;font-weight:700;color:#94a3b8;margin-bottom:.4rem}
.fld input{width:100%;padding:.8rem 1rem;background:rgba(15,23,42,.6);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;font-family:'Almarai',sans-serif;font-size:.9rem;color:#e2e8f0;outline:none;transition:all .2s}
.fld input::placeholder{color:#475569}
.fld input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.08)}
.btn-login{width:100%;background:linear-gradient(135deg,#1a3a4a,#2d5a6e);color:#fff;border:none;border-radius:12px;padding:.9rem;font-family:'Almarai',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:.25rem}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,58,74,.4)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;border-radius:10px;padding:.7rem 1rem;font-size:.82rem;margin-bottom:1rem;display:none}
.pending-msg{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fbbf24;border-radius:10px;padding:.7rem 1rem;font-size:.82rem;margin-bottom:1rem;display:none}
.links{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;font-size:.8rem}
.links a{color:#64748b;text-decoration:none}
.links a:hover{color:#94a3b8}
.links .reg-link{color:#38bdf8;font-weight:700}
</style>
</head>
<body>
<div class="top-link"><a href="/">← الرئيسية</a></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon"><img src="/images/rafd-logo.png" alt="RAFD" style="width:90px;height:auto;object-fit:contain;background:transparent"></div>
    <div class="logo-title">RAFD Digital</div>
    <div class="logo-sub">بوابة الشركاء</div>
    <div class="badge">🤝 منطقة الشركاء</div>
  </div>

  <div class="err" id="errMsg">بيانات الدخول غير صحيحة. تحقق من البريد وكلمة المرور.</div>
  <div class="pending-msg" id="pendingMsg">⏳ حسابك قيد المراجعة. سيتم إشعارك عند التفعيل.</div>

  <div class="fld">
    <label>البريد الإلكتروني</label>
    <input type="email" id="loginEmail" placeholder="name@company.com">
  </div>
  <div class="fld">
    <label>كلمة المرور</label>
    <input type="password" id="loginPass" placeholder="••••••••">
  </div>
  <button class="btn-login" id="loginBtn">دخول للوحة التحكم</button>

  <div class="links">
    <a href="/register-partner.html" class="reg-link">تسجيل جهة جديدة ←</a>
    <a href="/">العودة للرئيسية</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/partner-login.js"></script>
</body>
</html>
