<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — Rafd</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Almarai',sans-serif;background:linear-gradient(135deg,#f0f9ff,#e0f2fe,#f0fdf4);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.auth-card{background:#fff;border-radius:24px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.1);border:1px solid #e2e8f0}
.auth-logo{display:flex;align-items:center;gap:.75rem;justify-content:center;margin-bottom:2rem}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#1a3a4a,#4a9d6f);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:1.3rem}
.logo-text{font-size:1.5rem;font-weight:900;color:#0f172a}
h1{font-size:1.5rem;font-weight:800;color:#0f172a;text-align:center;margin-bottom:.5rem}
.sub{font-size:.875rem;color:#64748b;text-align:center;margin-bottom:2rem}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:.5rem}
.field input{width:100%;padding:.85rem 1rem;border:1.5px solid #e2e8f0;border-radius:12px;font-family:'Almarai',sans-serif;font-size:.9rem;color:#1e293b;transition:border-color .2s}
.field input:focus{outline:none;border-color:#1a3a4a;box-shadow:0 0 0 3px rgba(26,58,74,.08)}
.forgot{text-align:left;margin-top:.4rem}
.forgot a{font-size:.8rem;color:#1a3a4a;text-decoration:none}
.btn-login{width:100%;background:linear-gradient(135deg,#1a3a4a,#2d5a6e);color:#fff;border:none;padding:1rem;border-radius:12px;font-family:'Almarai',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,58,74,.25)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#dc2626;border-radius:10px;padding:.7rem 1rem;font-size:.85rem;margin-bottom:1rem;display:none;text-align:center}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.divider span{font-size:.8rem;color:#94a3b8}
.signup-link{text-align:center;font-size:.875rem;color:#64748b}
.signup-link a{color:#1a3a4a;font-weight:700;text-decoration:none}
.back-link{text-align:center;margin-top:1.5rem}
.back-link a{font-size:.8rem;color:#94a3b8;text-decoration:none}
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">R</div>
    <span class="logo-text">Rafd</span>
  </div>
  <h1>أهلاً بعودتك</h1>
  <p class="sub">سجّل دخولك للوصول إلى لوحة التحكم</p>

  <div class="err" id="errMsg"></div>

  <div class="field">
    <label>البريد الإلكتروني</label>
    <input type="email" id="loginEmail" placeholder="example@company.com" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <div class="field">
    <label>كلمة المرور</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="forgot"><a href="#">نسيت كلمة المرور؟</a></div>
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>
  <div class="divider"><span>أو</span></div>
  <div class="signup-link">ليس لديك حساب؟ <a href="/signup.html">أنشئ حساباً مجانياً</a></div>
  <div class="back-link"><a href="/">← العودة للرئيسية</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://ycnnawohrbbluawxzttt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RgOring3FCEiBMGYPcPmZg_s_85Yc_f';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('errMsg');
  const btn   = document.getElementById('loginBtn');

  errEl.style.display = 'none';

  if (!email || !pass) {
    errEl.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';

  try {
    const { data: partner, error } = await supabase
      .from('partners')
      .select('*')
      .eq('email', email)
      .maybeSingle();

    if (error) throw error;

    if (!partner) {
      errEl.textContent = 'البريد الإلكتروني غير مسجّل. يرجى إنشاء حساب جديد.';
      errEl.style.display = 'block';
      return;
    }

    let passwordMatch = false;
    try { passwordMatch = (atob(partner.password || '') === pass); }
    catch(e) { passwordMatch = (partner.password === pass); }

    if (!passwordMatch) {
      errEl.textContent = 'كلمة المرور غير صحيحة.';
      errEl.style.display = 'block';
      return;
    }

    if (partner.status === 'rejected') {
      errEl.textContent = 'عذراً، حسابك تم رفضه. تواصل مع الدعم للمزيد.';
      errEl.style.display = 'block';
      return;
    }

    localStorage.setItem('rafd_session', JSON.stringify({
      id: partner.id,
      email: partner.email,
      org: partner.org_name
    }));
    window.location.href = '/dashboard.html';

  } catch(err) {
    console.error('Login error:', err);
    errEl.textContent = 'حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مرة أخرى.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'تسجيل الدخول';
  }
}
</script>
</body>
</html>
