<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Rafd</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#f0f9ff,#e0f2fe,#f0fdf4);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{background:#fff;border-radius:24px;padding:2.5rem;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.1);border:1px solid #e2e8f0;position:relative}
.lang-row{display:flex;justify-content:flex-end;margin-bottom:1.25rem}
.auth-logo{display:flex;align-items:center;gap:.75rem;justify-content:center;margin-bottom:1.5rem;text-decoration:none}
.logo-text{font-size:1.5rem;font-weight:900;color:#0f172a}
h1{font-size:1.4rem;font-weight:800;color:#0f172a;text-align:center;margin-bottom:.4rem}
.sub{font-size:.875rem;color:#64748b;text-align:center;margin-bottom:1.75rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:.4rem}
.field input,.field select{width:100%;padding:.8rem 1rem;border:1.5px solid #e2e8f0;border-radius:12px;font-family:'Cairo',sans-serif;font-size:.9rem;color:#1e293b;transition:border-color .2s;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:#1a3a4a;box-shadow:0 0 0 3px rgba(26,58,74,.08)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn-signup{width:100%;background:linear-gradient(135deg,#1a3a4a,#2d5a6e);color:#fff;border:none;padding:1rem;border-radius:12px;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn-signup:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,58,74,.25)}
.terms{font-size:.78rem;color:#94a3b8;text-align:center;margin-top:1rem;line-height:1.6}
.terms a{color:#1a3a4a}
.login-link{text-align:center;font-size:.875rem;color:#64748b;margin-top:1rem}
.login-link a{color:#1a3a4a;font-weight:700;text-decoration:none}
.back-link{text-align:center;margin-top:1rem}
.back-link a{font-size:.8rem;color:#94a3b8;text-decoration:none}
.lang-toggle{background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:.3rem .7rem;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;color:#1e293b}
@media(max-width:480px){.field-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="auth-card">
  <div class="lang-row">
    <button id="langToggleBtn" class="lang-toggle" onclick="setLang(document.documentElement.lang==='ar'?'en':'ar')">🌐 عربي</button>
  </div>
  <a href="/" class="auth-logo">
    <img src="/rafd-logo.png" alt="Rafd" style="height:42px;width:auto;object-fit:contain;border-radius:11px" onerror="this.style.display='none'">
    <span class="logo-text">Rafd</span>
  </a>
  <h1 data-i18n="su.title">Create Your Account Free</h1>
  <p class="sub" data-i18n="su.sub">Start automating your organization's decisions today</p>
  <div class="field-row">
    <div class="field">
      <label data-i18n="su.lbl-fname">First Name</label>
      <input type="text" data-i18n-placeholder="su.ph-fname" placeholder="Mohammed">
    </div>
    <div class="field">
      <label data-i18n="su.lbl-lname">Last Name</label>
      <input type="text" data-i18n-placeholder="su.ph-lname" placeholder="Al-Ahmadi">
    </div>
  </div>
  <div class="field">
    <label data-i18n="su.lbl-org">Organization / Company Name</label>
    <input type="text" data-i18n-placeholder="su.ph-org" placeholder="Saudi Business Accelerator">
  </div>
  <div class="field">
    <label data-i18n="su.lbl-type">Organization Type</label>
    <select>
      <option value="" data-i18n="su.opt-choose">Choose type...</option>
      <option data-i18n="su.opt-bank">Bank or Financial Institution</option>
      <option data-i18n="su.opt-uni">University or Educational Institution</option>
      <option data-i18n="su.opt-acc">Accelerator or Incubator</option>
      <option data-i18n="su.opt-gov">Government Entity</option>
      <option data-i18n="su.opt-priv">Private Company</option>
      <option data-i18n="su.opt-other">Other</option>
    </select>
  </div>
  <div class="field">
    <label data-i18n="su.lbl-email">Email Address</label>
    <input type="email" placeholder="name@company.com">
  </div>
  <div class="field">
    <label data-i18n="su.lbl-pass">Password</label>
    <input type="password" data-i18n-placeholder="su.ph-pass" placeholder="At least 8 characters">
  </div>
  <button class="btn-signup" data-i18n="su.btn" onclick="window.location.href='/dashboard.html'">Create Account & Get Started</button>
  <p class="terms"><span data-i18n="su.terms-pre">By creating an account, you agree to our </span><a href="#" data-i18n="su.terms-tos">Terms of Service</a><span data-i18n="su.terms-and"> and </span><a href="#" data-i18n="su.terms-pp">Privacy Policy</a></p>
  <div class="login-link"><span data-i18n="su.have-acc">Already have an account? </span><a href="/login.html" data-i18n="su.login-link">Sign in</a></div>
  <div class="back-link"><a href="/" data-i18n="su.back">← Back to Home</a></div>
</div>
<script src="/i18n.js"></script>
</body>
</html>
