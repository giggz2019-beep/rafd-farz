<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="lid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="60%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#b4b4b4"/>
    </linearGradient>
    <linearGradient id="scr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- shadow -->
  <ellipse cx="400" cy="510" rx="320" ry="18" fill="rgba(0,0,0,0.18)"/>

  <!-- LID outer -->
  <rect x="60" y="10" width="680" height="290" rx="14" ry="14" fill="url(#lid)" filter="url(#sh)"/>
  <!-- LID bezel -->
  <rect x="72" y="20" width="656" height="270" rx="10" ry="10" fill="#1a1a1a"/>
  <!-- SCREEN area — transparent so HTML content shows -->
  <rect x="85" y="30" width="630" height="250" rx="6" ry="6" fill="white" opacity="0"/>
  <!-- Webcam dot -->
  <circle cx="400" cy="25" r="4" fill="#333"/>

  <!-- HINGE -->
  <rect x="50" y="296" width="700" height="8" rx="2" fill="#aaa"/>

  <!-- BASE outer -->
  <rect x="30" y="302" width="740" height="200" rx="10" ry="10" fill="url(#base)"/>
  <!-- BASE top shine -->
  <rect x="30" y="302" width="740" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- KEYBOARD AREA background -->
  <rect x="60" y="316" width="680" height="130" rx="6" fill="rgba(0,0,0,0.04)"/>

  <!-- Keys: fn row -->
  <g fill="#2a2a2a">
    <!-- fn row: 14 small keys -->
    <rect x="68" y="320" width="36" height="10" rx="2"/><rect x="107" y="320" width="36" height="10" rx="2"/><rect x="146" y="320" width="36" height="10" rx="2"/><rect x="185" y="320" width="36" height="10" rx="2"/>
    <rect x="232" y="320" width="36" height="10" rx="2"/><rect x="271" y="320" width="36" height="10" rx="2"/><rect x="310" y="320" width="36" height="10" rx="2"/><rect x="349" y="320" width="36" height="10" rx="2"/>
    <rect x="396" y="320" width="36" height="10" rx="2"/><rect x="435" y="320" width="36" height="10" rx="2"/><rect x="474" y="320" width="36" height="10" rx="2"/><rect x="513" y="320" width="36" height="10" rx="2"/>
    <rect x="560" y="320" width="36" height="10" rx="2"/><rect x="599" y="320" width="36" height="10" rx="2"/><rect x="638" y="320" width="36" height="10" rx="2"/><rect x="677" y="320" width="36" height="10" rx="2"/>

    <!-- num row: 13 keys -->
    <rect x="68" y="334" width="44" height="14" rx="3"/><rect x="115" y="334" width="44" height="14" rx="3"/><rect x="162" y="334" width="44" height="14" rx="3"/><rect x="209" y="334" width="44" height="14" rx="3"/>
    <rect x="256" y="334" width="44" height="14" rx="3"/><rect x="303" y="334" width="44" height="14" rx="3"/><rect x="350" y="334" width="44" height="14" rx="3"/><rect x="397" y="334" width="44" height="14" rx="3"/>
    <rect x="444" y="334" width="44" height="14" rx="3"/><rect x="491" y="334" width="44" height="14" rx="3"/><rect x="538" y="334" width="44" height="14" rx="3"/><rect x="585" y="334" width="44" height="14" rx="3"/>
    <rect x="632" y="334" width="81" height="14" rx="3"/>

    <!-- QWERTY row -->
    <rect x="68" y="352" width="58" height="14" rx="3"/><rect x="129" y="352" width="44" height="14" rx="3"/><rect x="176" y="352" width="44" height="14" rx="3"/><rect x="223" y="352" width="44" height="14" rx="3"/>
    <rect x="270" y="352" width="44" height="14" rx="3"/><rect x="317" y="352" width="44" height="14" rx="3"/><rect x="364" y="352" width="44" height="14" rx="3"/><rect x="411" y="352" width="44" height="14" rx="3"/>
    <rect x="458" y="352" width="44" height="14" rx="3"/><rect x="505" y="352" width="44" height="14" rx="3"/><rect x="552" y="352" width="44" height="14" rx="3"/><rect x="599" y="352" width="44" height="14" rx="3"/>
    <rect x="646" y="352" width="67" height="14" rx="3"/>

    <!-- ASDF row -->
    <rect x="68" y="370" width="65" height="14" rx="3"/><rect x="136" y="370" width="44" height="14" rx="3"/><rect x="183" y="370" width="44" height="14" rx="3"/><rect x="230" y="370" width="44" height="14" rx="3"/>
    <rect x="277" y="370" width="44" height="14" rx="3"/><rect x="324" y="370" width="44" height="14" rx="3"/><rect x="371" y="370" width="44" height="14" rx="3"/><rect x="418" y="370" width="44" height="14" rx="3"/>
    <rect x="465" y="370" width="44" height="14" rx="3"/><rect x="512" y="370" width="44" height="14" rx="3"/><rect x="559" y="370" width="44" height="14" rx="3"/>
    <rect x="606" y="370" width="107" height="14" rx="3"/>

    <!-- ZXCV row -->
    <rect x="68" y="388" width="83" height="14" rx="3"/><rect x="154" y="388" width="44" height="14" rx="3"/><rect x="201" y="388" width="44" height="14" rx="3"/><rect x="248" y="388" width="44" height="14" rx="3"/>
    <rect x="295" y="388" width="44" height="14" rx="3"/><rect x="342" y="388" width="44" height="14" rx="3"/><rect x="389" y="388" width="44" height="14" rx="3"/><rect x="436" y="388" width="44" height="14" rx="3"/>
    <rect x="483" y="388" width="44" height="14" rx="3"/><rect x="530" y="388" width="44" height="14" rx="3"/>
    <rect x="577" y="388" width="136" height="14" rx="3"/>

    <!-- Space row -->
    <rect x="68" y="406" width="66" height="14" rx="3"/>
    <rect x="137" y="406" width="44" height="14" rx="3"/>
    <rect x="184" y="406" width="350" height="14" rx="3"/>
    <rect x="537" y="406" width="44" height="14" rx="3"/>
    <rect x="584" y="406" width="44" height="14" rx="3"/>
    <rect x="631" y="406" width="26" height="14" rx="3"/>
    <rect x="660" y="406" width="26" height="14" rx="3"/>
    <rect x="689" y="406" width="24" height="6" rx="2"/>
    <rect x="689" y="414" width="24" height="6" rx="2"/>

    <!-- key shadows -->
    <rect x="68" y="320" width="36" height="10" rx="2" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
  </g>

  <!-- key highlights (top edge lighter) -->
  <g fill="rgba(255,255,255,0.06)">
    <rect x="68" y="334" width="44" height="3" rx="1"/>
    <rect x="115" y="334" width="44" height="3" rx="1"/>
    <rect x="162" y="334" width="44" height="3" rx="1"/>
    <rect x="209" y="334" width="44" height="3" rx="1"/>
    <rect x="256" y="334" width="44" height="3" rx="1"/>
    <rect x="303" y="334" width="44" height="3" rx="1"/>
    <rect x="350" y="334" width="44" height="3" rx="1"/>
    <rect x="397" y="334" width="44" height="3" rx="1"/>
    <rect x="444" y="334" width="44" height="3" rx="1"/>
    <rect x="491" y="334" width="44" height="3" rx="1"/>
    <rect x="538" y="334" width="44" height="3" rx="1"/>
    <rect x="585" y="334" width="44" height="3" rx="1"/>
  </g>

  <!-- TRACKPAD -->
  <rect x="280" y="428" width="240" height="58" rx="8" fill="#c8c8c8" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <rect x="282" y="430" width="236" height="3" rx="1" fill="rgba(255,255,255,0.4)"/>
</svg>
