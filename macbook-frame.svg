<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" fill="none">
  <defs>
    <linearGradient id="bdy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E2E2"/>
      <stop offset="100%" stop-color="#C4C4C4"/>
    </linearGradient>
    <linearGradient id="bdy2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#BBBBBB"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#383838"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <filter id="dropshadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#00000040"/>
    </filter>
    <clipPath id="screen-clip">
      <rect x="62" y="22" width="776" height="310" rx="5"/>
    </clipPath>
  </defs>

  <!-- body shadow -->
  <ellipse cx="450" cy="572" rx="360" ry="14" fill="#00000025"/>

  <!-- LID -->
  <rect x="20" y="10" width="860" height="340" rx="16" fill="url(#bdy)" filter="url(#dropshadow)"/>
  <!-- lid edge shine top -->
  <rect x="20" y="10" width="860" height="4" rx="2" fill="#F0F0F0"/>
  <!-- bezel (screen frame) -->
  <rect x="48" y="16" width="804" height="328" rx="10" fill="url(#bezel)"/>
  <!-- screen area — transparent, HTML overlays here -->
  <rect x="62" y="22" width="776" height="310" rx="5" fill="white" opacity="0"/>
  <!-- webcam -->
  <circle cx="450" cy="14" r="5" fill="#2A2A2A"/>
  <circle cx="450" cy="14" r="2.5" fill="#181818"/>

  <!-- HINGE -->
  <rect x="0" y="346" width="900" height="10" rx="2" fill="#AEAEAE"/>
  <rect x="0" y="346" width="900" height="2" rx="1" fill="#CCCCCC"/>

  <!-- BASE -->
  <rect x="0" y="354" width="900" height="210" rx="0 0 14 14" fill="url(#bdy2)"/>
  <rect x="0" y="558" width="900" height="6" rx="0 0 14 14" fill="#AAAAAA"/>

  <!-- KEY ROWS — proportional, refined -->
