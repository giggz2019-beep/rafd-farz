<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560">
<defs>
  <linearGradient id="g-lid" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#E6E6E6"/>
    <stop offset="100%" stop-color="#C2C2C2"/>
  </linearGradient>
  <linearGradient id="g-base" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#D6D6D6"/>
    <stop offset="100%" stop-color="#B4B4B4"/>
  </linearGradient>
  <linearGradient id="g-key" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3C3C3C"/>
    <stop offset="100%" stop-color="#1E1E1E"/>
  </linearGradient>
  <filter id="sh" x="-8%" y="-5%" width="116%" height="125%">
    <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="rgba(0,0,0,0.32)"/>
  </filter>
</defs>

<!-- ground shadow -->
<ellipse cx="430" cy="552" rx="370" ry="16" fill="rgba(0,0,0,0.15)"/>

<!-- ===== LID (screen part) — perspective quad ===== -->
<polygon points="110,8 780,8 780,322 110,322" fill="url(#g-lid)" filter="url(#sh)" rx="14"/>
<!-- lid rounded corners via rect -->
<rect x="110" y="8" width="670" height="314" rx="14" fill="url(#g-lid)" filter="url(#sh)"/>
<!-- bezel -->
<rect x="122" y="16" width="646" height="298" rx="10" fill="#1A1A1A"/>
<!-- screen transparent area — HTML goes here -->
<rect x="136" y="26" width="618" height="278" rx="5" fill="white" opacity="0"/>
<!-- webcam -->
<circle cx="445" cy="13" r="5" fill="#2C2C2C"/>
<circle cx="445" cy="13" r="2.5" fill="#141414"/>

<!-- ===== HINGE ===== -->
<rect x="90" y="320" width="680" height="9" rx="2" fill="#AEAEAE"/>
<rect x="90" y="320" width="680" height="2.5" rx="1" fill="rgba(255,255,255,0.5)"/>

<!-- ===== BASE ===== -->
<rect x="60" y="327" width="740" height="195" rx="0 0 14 14" fill="url(#g-base)"/>
<rect x="60" y="516" width="740" height="6" rx="3" fill="#A8A8A8"/>
<!-- base top edge shine -->
<rect x="60" y="327" width="740" height="3" fill="rgba(255,255,255,0.5)"/>

