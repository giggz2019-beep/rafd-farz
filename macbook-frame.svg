  <!-- TRACKPAD -->
  <rect x="310" y="504" width="280" height="56" rx="10" fill="#CBCBCB" stroke="#B8B8B8" stroke-width="1"/>
  <rect x="312" y="506" width="276" height="4" rx="2" fill="#DEDEDE"/>
